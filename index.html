<!doctype html>
<html lang="en">
  <head>
    <script>
      // Protect window.fetch from being overwritten by polyfills
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          var originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Attempted to overwrite window.fetch with:', v);
                // Do nothing, effectively ignoring the assignment
              },
              configurable: false
            });
          } catch (e) {
            // If it's already read-only, this might fail, which is fine
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DigitalEmpire</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
